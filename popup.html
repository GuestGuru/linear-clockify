<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clockify Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      padding: 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #e8e8e8;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      max-height: 560px;
    }
    #content {
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
    }
    .stop-btn {
      width: 100%;
      padding: 8px 16px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .stop-btn:hover { opacity: 0.9; }
    .stop-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .done-btn {
      width: 100%;
      padding: 8px 16px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    .done-btn:hover { opacity: 0.9; }
    .done-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .no-timer { color: #888; text-align: center; padding: 20px 0; }
    .error { color: #ef4444; margin-top: 8px; font-size: 12px; display: none; }

    .section-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin: 16px 0 8px;
    }
    .section-header:first-child { margin-top: 0; }
    .recent-list { display: flex; flex-direction: column; gap: 6px; }
    .recent-day-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 2px 0;
    }
    .recent-day-divider::before,
    .recent-day-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #3a3a55;
    }
    .recent-day-divider span {
      color: #888;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .recent-row {
      background: #23233a;
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .recent-row.running { border: 1px solid #ef4444; }
    .recent-row-top {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }
    .recent-issue-link {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      text-decoration: none;
      flex-shrink: 0;
      line-height: 1.4;
    }
    .recent-issue-link:hover { text-decoration: underline; }
    .recent-hs-link {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #60a5fa;
      text-decoration: none;
      flex-shrink: 0;
      line-height: 1.4;
    }
    .recent-hs-link:hover { text-decoration: underline; }
    .recent-desc {
      color: #ccc;
      font-size: 12px;
      line-height: 1.4;
      min-width: 0;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .recent-row-bottom {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .recent-time-input {
      width: 46px;
      background: #1a1a2e;
      border: 1px solid #3a3a55;
      border-radius: 4px;
      color: #e8e8e8;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      padding: 2px 4px;
      text-align: center;
    }
    .recent-time-input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .recent-time-input.running-end {
      color: #ef4444;
      background: transparent;
      border: 1px dashed #3a3a55;
      font-variant-numeric: tabular-nums;
    }
    .recent-dash { color: #666; }
    .recent-duration {
      color: #888;
      font-size: 11px;
      margin-left: 4px;
    }
    .recent-status {
      font-size: 11px;
      margin-left: 6px;
    }
    .recent-status.success { color: #10b981; }
    .recent-status.error { color: #ef4444; }
    .recent-status.info { color: #888; }
    .recent-empty {
      color: #666;
      font-size: 12px;
      text-align: center;
      padding: 8px 0;
    }
    .recent-pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .recent-page-btn {
      background: transparent;
      border: 1px solid #3a3a55;
      color: #888;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .recent-page-btn:hover:not(:disabled) {
      color: #a78bfa;
      border-color: #a78bfa;
    }
    .recent-page-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .recent-page-label {
      color: #888;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    .recent-play {
      margin-left: auto;
      background: transparent;
      border: 1px solid #3a3a55;
      color: #888;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .recent-play:hover {
      color: #22c55e;
      border-color: #22c55e;
    }
    .recent-play:disabled { opacity: 0.5; cursor: not-allowed; }
    .recent-delete {
      margin-left: auto;
      background: transparent;
      border: 1px solid #3a3a55;
      color: #888;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .recent-play + .recent-delete { margin-left: 0; }
    .recent-delete:hover {
      color: #ef4444;
      border-color: #ef4444;
    }
    .recent-delete.confirm {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444;
      font-size: 10px;
      width: auto;
      padding: 0 6px;
    }
    .recent-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .recent-actions .stop-btn,
    .recent-actions .done-btn {
      flex: 1;
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
      margin-top: 0;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #3a3a55;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: lc-spin 0.7s linear infinite;
      vertical-align: middle;
    }
    .spinner-center {
      text-align: center;
      padding: 12px 0;
      color: #888;
      font-size: 12px;
    }
    .spinner-center .spinner {
      margin-right: 6px;
    }
    @keyframes lc-spin {
      to { transform: rotate(360deg); }
    }

    /* Start-entry section (shown when on Linear/HS tab and no timer running) */
    .start-section {
      background: #23233a;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .start-context {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 12px;
      line-height: 1.4;
      min-width: 0;
    }
    .start-context-key {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      flex-shrink: 0;
    }
    .start-context-key.hs { color: #60a5fa; }
    .start-context-title {
      color: #ccc;
      min-width: 0;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .start-actions {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .start-btn {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #fff;
      background: #22c55e;
    }
    .start-btn:hover { opacity: 0.9; }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .start-btn.snap {
      background: #0ea5e9;
    }
    .start-btn-manual {
      width: 36px;
      flex: 0 0 auto;
      padding: 0;
      background: #2d2d45;
      color: #e8e8e8;
      border: 1px solid #3a3a55;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .start-btn-manual:hover { background: #35355a; }
    .start-btn-manual.active {
      background: #3730a3;
      border-color: #6366f1;
      color: #fff;
    }
    .start-manual-form {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
      padding-top: 8px;
      border-top: 1px solid #3a3a55;
    }
    .start-manual-form.open { display: flex; }
    .start-manual-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .start-manual-row input[type="text"] {
      width: 54px;
      background: #1a1a2e;
      border: 1px solid #3a3a55;
      border-radius: 4px;
      color: #e8e8e8;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      padding: 4px;
      text-align: center;
    }
    .start-manual-row input[type="text"]:focus,
    .start-manual-row input[type="date"]:focus {
      outline: none;
      border-color: #6366f1;
    }
    .start-manual-row input[type="date"] {
      background: #1a1a2e;
      border: 1px solid #3a3a55;
      border-radius: 4px;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 12px;
      padding: 3px 4px;
      color-scheme: dark;
    }
    .start-manual-dash { color: #666; }
    .start-manual-date-chip {
      background: #1a1a2e;
      border: 1px solid #3a3a55;
      border-radius: 4px;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .start-manual-date-chip:hover { border-color: #6366f1; }
    .start-manual-submit {
      padding: 5px 12px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-left: auto;
    }
    .start-manual-submit:hover { opacity: 0.9; }
    .start-manual-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .start-manual-status {
      font-size: 11px;
      display: none;
    }
    .start-manual-status.info { display: block; color: #888; }
    .start-manual-status.success { display: block; color: #10b981; }
    .start-manual-status.error { display: block; color: #ef4444; }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
    }
    .footer-links a {
      color: #6366f1;
      text-decoration: none;
      font-size: 12px;
    }
    .footer-links a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div id="content"><div class="spinner-center"><span class="spinner"></span>Betöltés…</div></div>
  <div class="footer-links">
    <a href="#" id="settings-link">⚙️ Beállítások</a>
    <a href="https://app.clockify.me/tracker" target="_blank" rel="noopener noreferrer">⏱ Clockify</a>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
